# =============================================================================
# Message Watchdog — Configuration
# =============================================================================
# This file defines what to watch and how to alert.
# No code changes are needed to add, remove, or modify watchdogs.
# Credentials belong in .env (never in this file).
# =============================================================================

# ---------------------------------------------------------------------------
# LLM Provider
# Switch between Anthropic Claude and Azure OpenAI by changing `provider`.
# ---------------------------------------------------------------------------
llm:
  provider: azure_openai

  # --- Azure OpenAI settings ---
  azure_deployment: "gpt-4.1"
  azure_api_version: "2025-01-01-preview"

  # --- Anthropic settings (unused while provider: azure_openai) ---
  # primary_model: "claude-haiku-4-5-20251001"
  # escalation_model: "claude-sonnet-4-6"

# ---------------------------------------------------------------------------
# Watchdog definitions
# Multiple watchdogs can target the same group — only one Telegram connection
# is created per unique group, shared across all watchdogs targeting it.
# ---------------------------------------------------------------------------
watchdogs:

  - name: "H1B Slot Opening India"
    source_type: telegram
    source_group: "https://t.me/us_visa_stamping_india"

    # Natural-language condition — the LLM evaluates message batches against this.
    # Be descriptive. Mention alternate spellings, abbreviations, and context clues.
    condition: >
      Alert me when H1B visa stamping slots are actively opening RIGHT NOW at US consulates
      in India. Signs to watch for: people saying slots are currently visible, available, or
      open; bulk slots dropping or being released; mentions of specific cities — full names
      (Mumbai/Bombay, Chennai/Madras, Hyderabad, Delhi/New Delhi, Kolkata/Calcutta) or their
      common short forms (Mum, Che/Chn, Hyd, Del, Kol) — combined with current availability;
      the appointment calendar showing dates; screenshots of the booking portal or calendar
      being posted (burst of photo messages); people saying they just booked or are booking
      right now; sudden group excitement or urgent calls to action.

      HIGH-CONFIDENCE real-time indicators:
      - First-person present reports: "just booked", "I'm booking now", "just got in",
        "in the queue", "appointment confirmed", "slot showing on my screen"
      - Urgent calls to action: "check now", "go refresh the portal", "hurry", "quickly"
      - Bulk or specific numbers: "50 slots dropped", "100 available", calendar showing dates

      NEGATIVE signals — lower your confidence significantly if these are present:
      - "N/A", "FULL", "BOOKED OUT", "NOT AVAILABLE" after a visa category and/or city means
        NO slots (e.g. "H1B N/A Hyd/Chn" = not available in Hyderabad/Chennai). OPPOSITE signal.
      - Past-tense or historical discussion ("bulk slots last few weeks", "slots opened this
        morning", "I booked yesterday") with no evidence of CURRENT availability.
      - PREDICTED future openings: "slots might drop at 3pm", "coming in the next batch",
        "they open tomorrow" — future tense is NOT current availability.
      - Someone ASKING whether slots are open without multiple clear affirmative responses.
      - Discussions about B1, B2, F1, L1, or other non-H1B visa categories.
      - Technical complaints (login errors, site down, fee issues) with no slot availability.

      Abbreviations used: "H-1B" (official), "h1b", "h1-b", "h 1b", "h1b stmpng".
      People misspell and use terrible grammar — be robust to this.

    confidence_threshold: 0.68   # gate for any alert to fire; raise if false positives persist
    channel_thresholds:
      phone_call: 0.90     # only call for high-confidence active openings
      telegram_self: 0.80  # Telegram message for moderate-confidence events
    alert_channels:
      - phone_call      # PRIMARY: rings through silent mode
      - telegram_self   # instant push notification
      - email           # backup
    cooldown_seconds: 300
    batch_window_seconds: 60
    batch_burst_cap: 30

    # Surge gate — LLM trip switch.
    # Blocks LLM calls during quiet periods. Saves ~95% of token costs.
    # The LLM only runs when at least one condition below is met:
    surge_gate:
      enabled: true
      min_spike_factor: 2.5          # message rate ≥ 2.5× baseline
      always_classify_rate: 3.0      # always classify if rate ≥ 3 msg/min regardless
      keyword_patterns:
        - 'h\s*[-]?\s*1\s*[-]?\s*b'       # h1b, h-1b, h1-b (H-1B canonical), h 1 b
        - 'slot'
        - 'appointment'
        - 'stamp'
        - 'consulate|embassy'
        - 'calendar'                        # appointment calendar showing dates
        - 'availab'                         # available, availability
        - 'bulk'                            # bulk slot drops
        - 'hyderabad|\bhyd\b'
        - 'chennai|madras|\bchn\b|\bche\b'
        - 'mumbai|bombay|\bmum\b'
        - 'delhi|kolkata|calcutta|\bkol\b'

  # Add more watchdogs here — same group, no extra connection created:
  #
  # - name: "H4 Slots Opening"
  #   source_type: telegram
  #   source_group: "https://t.me/us_visa_stamping_india"
  #   condition: >
  #     Alert me when H4 dependent visa slots become available at any US
  #     consulate in India.
  #   confidence_threshold: 0.75
  #   alert_channels: [telegram_self, email]
  #   cooldown_seconds: 600
  #   batch_window_seconds: 60
  #   batch_burst_cap: 30
  #   surge_gate:
  #     enabled: true
  #     min_spike_factor: 2.5
  #     always_classify_rate: 3.0
  #     keyword_patterns: ['h\s*4', 'dependent\s+visa']

# ---------------------------------------------------------------------------
# Alert channel configuration
# ---------------------------------------------------------------------------
alert_channels:
  phone_call:
    enabled: true

  telegram_self:
    enabled: true

  email:
    enabled: true
    # sender and recipient are read from Key Vault secrets gmail-sender / gmail-recipient
    # (or GMAIL_SENDER / GMAIL_RECIPIENT env vars for local development)

# ---------------------------------------------------------------------------
# Source settings
# ---------------------------------------------------------------------------
sources:
  telegram:
    # Local development    : session_name: "watchdog_session"
    # Azure ACI deployment : session_name: "/session-store/watchdog_session"
    #   The /session-store path is the Azure File Share mount point (see deploy.yml).
    #   The .session file persists there across container restarts.
    session_name: "/session-store/watchdog_session"

    # On startup, fetch and classify this many minutes of recent group history.
    # Covers the brief gap during a deploy restart or container crash.
    # Set to 0 to disable catch-up entirely.
    startup_lookback_minutes: 30

    # Periodic catch-up: re-fetches this many minutes of history every N minutes
    # to recover messages the real-time event handler may have missed.
    # Set to 0 to disable. Lookback window is (periodic_catch_up_minutes + 2) min.
    periodic_catch_up_minutes: 5

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
log_dir: "logs"
log_level: "INFO"
dry_run: false       # set true or use --dry-run CLI flag for testing
